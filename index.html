<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny'sideup English — Word Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0d14;
  --surface:   #13151f;
  --surface2:  #1a1d2b;
  --border:    rgba(255,255,255,0.07);
  --gold:      #e8b84b;
  --gold-dim:  #7a5f1f;
  --gold-glow: rgba(232,184,75,0.18);
  --white:     #f0f2f8;
  --muted:     #6b7080;
  --green:     #22c55e;
  --red:       #ef4444;
  --jason:     #4f8ef7;
  --clara:     #e05c5c;
  --accent:    #e8b84b;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ── Stage lighting background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(232,184,75,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 100%, rgba(79,142,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 100%, rgba(224,92,92,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Scan-line texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
.header {
  width: 100%;
  max-width: 700px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
}

.brand-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* Minimal sun mark */
.sun-mark {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(1.5rem, 5vw, 2.2rem);
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--white);
}
.brand-name em {
  font-style: italic;
  color: var(--gold);
}

.brand-sub {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Gold divider */
.gold-line {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 2px 0;
}

/* ══════════════════════════════════
   HUD  (score / streak / q)
══════════════════════════════════ */
.hud {
  width: 100%;
  max-width: 700px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.hud-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.hud-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}
.hud-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.hud-cell.streak .hud-val { color: #f97316; }
.hud-cell.qnum .hud-val { color: var(--white); font-size: 1.1rem; margin-top: 4px; }

/* ══════════════════════════════════
   PROGRESS
══════════════════════════════════ */
.prog-track {
  width: 100%;
  max-width: 700px;
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 18px;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(.22,1,.36,1);
}

/* ══════════════════════════════════
   MAIN CARD
══════════════════════════════════ */
.card {
  width: 100%;
  max-width: 700px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(232,184,75,0.08),
    0 30px 80px rgba(0,0,0,0.6);
}

/* Gold top edge */
.card-edge {
  height: 3px;
  background: linear-gradient(90deg, var(--jason), var(--gold), var(--clara));
}

.card-body {
  padding: 24px 24px 28px;
}

/* ── Timer row ── */
.timer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.q-label-pill {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  background: var(--gold-glow);
  border: 1px solid rgba(232,184,75,0.2);
  border-radius: 99px;
  padding: 5px 14px;
}

.timer-ring-wrap {
  position: relative;
  width: 54px;
  height: 54px;
}
.timer-svg { width: 54px; height: 54px; transform: rotate(-90deg); }
.t-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
.t-arc {
  fill: none;
  stroke: var(--gold);
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 154;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 0.15s linear, stroke 0.3s;
}
.timer-inner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--gold);
}

/* ── Sentence ── */
.sentence-wrap {
  text-align: center;
  margin-bottom: 22px;
  padding: 20px;
  background: var(--surface2);
  border-radius: 14px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.sentence-wrap::before {
  content: '"';
  position: absolute;
  top: -10px;
  left: 12px;
  font-size: 5rem;
  font-family: 'Playfair Display', serif;
  color: rgba(232,184,75,0.08);
  line-height: 1;
  pointer-events: none;
}
.sentence-micro {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.sentence-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.25rem, 4vw, 1.75rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.4;
}
.blank {
  display: inline-block;
  min-width: 110px;
  border-bottom: 2px solid var(--gold);
  color: var(--gold);
  padding-bottom: 2px;
}

/* ── Characters ── */
.hosts-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: end;
  gap: 10px;
  margin-bottom: 20px;
}

.host-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.bubble {
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 0.82rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  position: relative;
  max-width: 160px;
  border: 1px solid;
  transition: all 0.3s;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: -9px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
}

.jason-panel .bubble {
  background: rgba(79,142,247,0.12);
  border-color: rgba(79,142,247,0.3);
  color: #93c5fd;
}
.jason-panel .bubble::after {
  right: 16px;
  border-top: 9px solid rgba(79,142,247,0.3);
}

.clara-panel .bubble {
  background: rgba(224,92,92,0.12);
  border-color: rgba(224,92,92,0.3);
  color: #fca5a5;
}
.clara-panel .bubble::after {
  left: 16px;
  border-top: 9px solid rgba(224,92,92,0.3);
}

.host-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--surface2);
  border: 2px solid;
  flex-shrink: 0;
  transition: all 0.4s ease;
  position: relative;
}
.jason-panel .host-avatar { border-color: rgba(79,142,247,0.4); }
.clara-panel .host-avatar { border-color: rgba(224,92,92,0.4); }

.host-avatar svg { width: 100%; height: 100%; }

.host-name {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.jason-panel .host-name { color: var(--jason); }
.clara-panel .host-name { color: var(--clara); }

/* Avatar states */
.host-avatar.arguing {
  animation: avatarArgue 0.6s ease-in-out infinite alternate;
}
.jason-panel .host-avatar.arguing { animation-name: argueJ; }
.clara-panel .host-avatar.arguing { animation-name: argueC; }
@keyframes argueJ {
  from { transform: rotate(-2deg) translateX(3px); }
  to   { transform: rotate(2deg)  translateX(8px); }
}
@keyframes argueC {
  from { transform: rotate(2deg)  translateX(-3px); }
  to   { transform: rotate(-2deg) translateX(-8px); }
}
.host-avatar.winner {
  border-color: var(--green) !important;
  box-shadow: 0 0 24px rgba(34,197,94,0.4);
  animation: winPop 0.5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes winPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.host-avatar.loser {
  opacity: 0.3;
  filter: grayscale(1);
  transform: scale(0.88);
}

/* VS center */
.vs-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding-bottom: 28px;
}
.vs-text {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 900;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 0.05em;
}
.vs-divider {
  width: 1px;
  height: 30px;
  background: linear-gradient(to bottom, transparent, var(--border), transparent);
}

/* ── Answer buttons ── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 0;
}

.choice-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}
.choice-btn:nth-child(1)::before { background: linear-gradient(135deg, rgba(79,142,247,0.08), transparent); }
.choice-btn:nth-child(2)::before { background: linear-gradient(135deg, rgba(224,92,92,0.08), transparent); }

.choice-btn:hover:not(:disabled) { transform: translateY(-2px); }
.choice-btn:nth-child(1):hover:not(:disabled) { border-color: rgba(79,142,247,0.5); box-shadow: 0 8px 24px rgba(79,142,247,0.15); }
.choice-btn:nth-child(2):hover:not(:disabled) { border-color: rgba(224,92,92,0.5); box-shadow: 0 8px 24px rgba(224,92,92,0.15); }
.choice-btn:hover:not(:disabled)::before { opacity: 1; }

.choice-key {
  width: 30px;
  height: 30px;
  min-width: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  flex-shrink: 0;
}
.choice-btn:nth-child(1) .choice-key { background: rgba(79,142,247,0.15); color: var(--jason); border: 1px solid rgba(79,142,247,0.25); }
.choice-btn:nth-child(2) .choice-key { background: rgba(224,92,92,0.15); color: var(--clara); border: 1px solid rgba(224,92,92,0.25); }

.choice-word {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.02em;
}

/* States */
.choice-btn.correct {
  background: rgba(34,197,94,0.1);
  border-color: var(--green);
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
}
.choice-btn.correct .choice-key { background: var(--green); color: #000; border-color: var(--green); }
.choice-btn.correct .choice-word { color: var(--green); }

.choice-btn.wrong {
  background: rgba(239,68,68,0.08);
  border-color: var(--red);
  opacity: 0.6;
  animation: wrongShake 0.35s ease both;
}
.choice-btn.wrong .choice-key { background: var(--red); color: white; border-color: var(--red); }

.choice-btn.dim { opacity: 0.2; pointer-events: none; }

@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-5px); }
  40%,80%  { transform: translateX(5px); }
}

/* ── Result panel ── */
.result-panel {
  display: none;
  margin-top: 16px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  animation: resultIn 0.35s cubic-bezier(.22,1,.36,1) both;
}
.result-panel.show { display: block; }
@keyframes resultIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-verdict {
  padding: 12px 18px;
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
.result-verdict.correct { background: rgba(34,197,94,0.12); color: var(--green); }
.result-verdict.wrong   { background: rgba(239,68,68,0.1);  color: var(--red); }
.result-verdict.timeout { background: rgba(232,184,75,0.1); color: var(--gold); }

.result-defs {
  background: var(--surface2);
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.def-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.82rem;
}
.def-marker {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.def-marker.c { background: var(--green); }
.def-marker.o { background: var(--muted); }
.def-kw {
  font-weight: 800;
  color: var(--gold);
  margin-right: 4px;
}
.def-kw.other { color: var(--muted); }
.def-meaning { color: #8892a4; font-weight: 600; line-height: 1.4; }

/* ── CTA ── */
.cta-bar {
  display: none;
  margin-top: 12px;
  padding: 11px 16px;
  background: rgba(232,184,75,0.06);
  border: 1px solid rgba(232,184,75,0.15);
  border-radius: 10px;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
  letter-spacing: 0.05em;
  animation: resultIn 0.35s 0.2s ease both;
}
.cta-bar.show { display: block; }
.cta-bar span { color: var(--gold); }

/* ── Next btn ── */
.next-btn {
  display: none;
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 10px;
  color: var(--gold);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  animation: resultIn 0.35s 0.1s ease both;
}
.next-btn:hover {
  background: var(--gold-glow);
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold-glow);
}
.next-btn.show { display: block; }

/* ══════════════════════════════════
   END SCREEN
══════════════════════════════════ */
.end-screen {
  display: none;
  text-align: center;
  padding: 10px;
  animation: resultIn 0.5s ease both;
}
.end-screen.show { display: block; }

.end-avatars {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-bottom: 20px;
}
.end-av {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.end-av-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--border);
}
.end-av-name {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.end-heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  font-weight: 900;
  color: var(--white);
  margin-bottom: 6px;
}
.end-score-label {
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.end-score-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 10vw, 4.5rem);
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 40px var(--gold-glow);
}
.end-msg {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 24px;
}

.replay-btn {
  padding: 14px 40px;
  background: transparent;
  border: 1px solid var(--gold-dim);
  border-radius: 10px;
  color: var(--gold);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.replay-btn:hover {
  background: var(--gold-glow);
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold-glow);
}

/* ══════════════════════════════════
   CONFETTI
══════════════════════════════════ */
.confetti-layer {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999;
}
.cp {
  position: absolute;
  animation: cpFall var(--dur) ease-in var(--del) both;
}
@keyframes cpFall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh)  rotate(540deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="confetti-layer" id="confetti"></div>

<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="brand-row">
      <svg class="sun-mark" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="13" fill="none" stroke="#e8b84b" stroke-width="2.5"/>
        <g stroke="#e8b84b" stroke-width="2" stroke-linecap="round">
          <line x1="30" y1="4"  x2="30" y2="10"/>
          <line x1="30" y1="50" x2="30" y2="56"/>
          <line x1="4"  y1="30" x2="10" y2="30"/>
          <line x1="50" y1="30" x2="56" y2="30"/>
          <line x1="11" y1="11" x2="15" y2="15"/>
          <line x1="45" y1="45" x2="49" y2="49"/>
          <line x1="49" y1="11" x2="45" y2="15"/>
          <line x1="15" y1="45" x2="11" y2="49"/>
        </g>
        <circle cx="30" cy="30" r="4" fill="#e8b84b"/>
      </svg>
      <div class="brand-name">Sunny'<em>sideup</em> English</div>
    </div>
    <div class="gold-line"></div>
    <div class="brand-sub">Word Challenge — Live Quiz</div>
  </header>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-cell score">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="scoreVal">0</div>
    </div>
    <div class="hud-cell streak">
      <div class="hud-label">Streak</div>
      <div class="hud-val" id="streakVal">0</div>
    </div>
    <div class="hud-cell qnum">
      <div class="hud-label">Question</div>
      <div class="hud-val" id="qVal">1 of 5</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-track">
    <div class="prog-fill" id="progFill" style="width:0%"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">
    <div class="card-edge"></div>
    <div class="card-body">

      <div id="gameArea"><!-- filled by JS --></div>

      <!-- END SCREEN (inside card) -->
      <div class="end-screen" id="endScreen">
        <div class="end-avatars">
          <div class="end-av">
            <div class="end-av-circle" style="border-color:rgba(79,142,247,0.4)">
              <svg viewBox="0 0 120 120"><ellipse cx="60" cy="68" rx="42" ry="48" fill="#FDDBB4"/><ellipse cx="60" cy="32" rx="42" ry="26" fill="#5C3317"/><ellipse cx="30" cy="40" rx="14" ry="18" fill="#5C3317"/><ellipse cx="90" cy="40" rx="14" ry="18" fill="#5C3317"/><ellipse cx="18" cy="70" rx="10" ry="13" fill="#FDDBB4"/><ellipse cx="102" cy="70" rx="10" ry="13" fill="#FDDBB4"/><circle cx="45" cy="62" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/><circle cx="75" cy="62" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/><circle cx="46" cy="63" r="5" fill="#1a1212"/><circle cx="76" cy="63" r="5" fill="#1a1212"/><circle cx="48" cy="61" r="2" fill="white"/><circle cx="78" cy="61" r="2" fill="white"/><path d="M 46 82 Q 60 94 74 82" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="60" cy="73" rx="5" ry="3.5" fill="#e8a882"/><rect x="28" y="110" width="64" height="22" rx="4" fill="#3a6fd4"/></svg>
            </div>
            <div class="end-av-name" style="color:#4f8ef7">Jason</div>
          </div>
          <div style="display:flex;align-items:center;font-size:0.7rem;font-weight:800;letter-spacing:0.2em;color:#2a2d3a">&amp;</div>
          <div class="end-av">
            <div class="end-av-circle" style="border-color:rgba(224,92,92,0.4)">
              <svg viewBox="0 0 120 120"><ellipse cx="60" cy="80" rx="50" ry="44" fill="#9B2335"/><ellipse cx="60" cy="65" rx="38" ry="44" fill="#FDDBB4"/><ellipse cx="60" cy="30" rx="38" ry="22" fill="#9B2335"/><ellipse cx="22" cy="67" rx="9" ry="12" fill="#FDDBB4"/><ellipse cx="98" cy="67" rx="9" ry="12" fill="#FDDBB4"/><circle cx="46" cy="60" r="8.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/><circle cx="74" cy="60" r="8.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/><circle cx="47" cy="61" r="4.5" fill="#1a1212"/><circle cx="75" cy="61" r="4.5" fill="#1a1212"/><circle cx="49" cy="59" r="1.8" fill="white"/><circle cx="77" cy="59" r="1.8" fill="white"/><path d="M 47 79 Q 60 91 73 79" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="60" cy="71" rx="4.5" ry="3" fill="#e8a882"/><rect x="26" y="104" width="68" height="22" rx="6" fill="#e8e0d0"/></svg>
            </div>
            <div class="end-av-name" style="color:#e05c5c">Clara</div>
          </div>
        </div>
        <div class="end-heading" id="endHeading">Well Played.</div>
        <div class="end-score-label">Final Score</div>
        <div class="end-score-num" id="endScoreNum">0</div>
        <div class="end-msg" id="endMsg"></div>
        <button class="replay-btn" onclick="startGame()">Play Again</button>
      </div>

    </div>
  </div>

</div><!-- /page -->

<script>
const QS = [
  {
    sentence: "The sink is _____.",
    choices: ["leaking", "overflowing"],
    answer: 1,
    jSays: '"It\'s leaking."', cSays: '"It\'s overflowing."',
    jPicks: 0, cPicks: 1,
    defs: [
      { word: "overflowing", meaning: "too full — water spilling over the top", correct: true },
      { word: "leaking",     meaning: "water escaping through a hole or crack", correct: false }
    ]
  },
  {
    sentence: "She _____ her eyes and fell asleep.",
    choices: ["closed", "shut"],
    answer: 0,
    jSays: '"closed, obviously."', cSays: '"I\'d say shut."',
    jPicks: 0, cPicks: 1,
    defs: [
      { word: "closed", meaning: "gently shut — the natural word for eyes", correct: true },
      { word: "shut",   meaning: "forceful or abrupt — implies noise or effort", correct: false }
    ]
  },
  {
    sentence: "He was _____ when he heard the news.",
    choices: ["shocked", "surprised"],
    answer: 0,
    jSays: '"Shocked — no doubt."', cSays: '"Could be surprised."',
    jPicks: 0, cPicks: 1,
    defs: [
      { word: "shocked",   meaning: "deeply stunned — a much stronger reaction", correct: true },
      { word: "surprised", meaning: "mildly unexpected — a neutral response", correct: false }
    ]
  },
  {
    sentence: "Could you please _____ me the salt?",
    choices: ["bring", "pass"],
    answer: 1,
    jSays: '"Hmm… bring?"', cSays: '"Pass. Definitely pass."',
    jPicks: 0, cPicks: 1,
    defs: [
      { word: "pass", meaning: "hand something across a table — same location", correct: true },
      { word: "bring", meaning: "carry from another place toward you", correct: false }
    ]
  },
  {
    sentence: "The music was so loud it _____ my ears.",
    choices: ["hurt", "damaged"],
    answer: 0,
    jSays: '"hurt — natural."', cSays: '"damaged sounds right."',
    jPicks: 0, cPicks: 1,
    defs: [
      { word: "hurt",    meaning: "caused pain — the natural spoken choice here", correct: true },
      { word: "damaged", meaning: "caused physical harm — formal or medical register", correct: false }
    ]
  }
];

let cQ=0, score=0, streak=0, answered=false;
let tInt=null, tLeft=10;
const CIRC = 2*Math.PI*24; // r=24

// ── SVG faces ──
function jasonSVG(expr='n') {
  const m = expr==='h' ? 'M 46 82 Q 60 97 74 82' : expr==='s' ? 'M 46 88 Q 60 80 74 88' : 'M 46 82 Q 60 94 74 82';
  return `<svg viewBox="0 0 120 120" width="100%" height="100%">
    <ellipse cx="60" cy="68" rx="42" ry="48" fill="#FDDBB4"/>
    <ellipse cx="60" cy="32" rx="42" ry="26" fill="#5C3317"/>
    <ellipse cx="30" cy="40" rx="14" ry="18" fill="#5C3317"/>
    <ellipse cx="90" cy="40" rx="14" ry="18" fill="#5C3317"/>
    <ellipse cx="18" cy="70" rx="10" ry="13" fill="#FDDBB4"/>
    <ellipse cx="102" cy="70" rx="10" ry="13" fill="#FDDBB4"/>
    <circle cx="45" cy="62" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="75" cy="62" r="9" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="46" cy="63" r="5" fill="#1a1212"/>
    <circle cx="76" cy="63" r="5" fill="#1a1212"/>
    <circle cx="48" cy="61" r="2" fill="white"/>
    <circle cx="78" cy="61" r="2" fill="white"/>
    <path d="${m}" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="60" cy="73" rx="5" ry="3.5" fill="#e8a882"/>
    <rect x="28" y="110" width="64" height="22" rx="4" fill="#3a6fd4"/>
  </svg>`;
}
function claraSVG(expr='n') {
  const m = expr==='h' ? 'M 47 79 Q 60 95 73 79' : expr==='s' ? 'M 47 85 Q 60 76 73 85' : 'M 47 79 Q 60 91 73 79';
  return `<svg viewBox="0 0 120 120" width="100%" height="100%">
    <ellipse cx="60" cy="80" rx="50" ry="44" fill="#9B2335"/>
    <ellipse cx="60" cy="65" rx="38" ry="44" fill="#FDDBB4"/>
    <ellipse cx="60" cy="30" rx="38" ry="22" fill="#9B2335"/>
    <ellipse cx="22" cy="67" rx="9" ry="12" fill="#FDDBB4"/>
    <ellipse cx="98" cy="67" rx="9" ry="12" fill="#FDDBB4"/>
    <circle cx="46" cy="60" r="8.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="74" cy="60" r="8.5" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="47" cy="61" r="4.5" fill="#1a1212"/>
    <circle cx="75" cy="61" r="4.5" fill="#1a1212"/>
    <circle cx="49" cy="59" r="1.8" fill="white"/>
    <circle cx="77" cy="59" r="1.8" fill="white"/>
    <path d="${m}" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="60" cy="71" rx="4.5" ry="3" fill="#e8a882"/>
    <rect x="26" y="104" width="68" height="22" rx="6" fill="#e8e0d0"/>
  </svg>`;
}

function hostsHTML(state) {
  const q = QS[cQ];
  const jWin = state==='j-win', cWin = state==='c-win';
  const jExpr = jWin?'h':cWin?'s':'n';
  const cExpr = cWin?'h':jWin?'s':'n';
  const jCls = jWin?'winner':cWin?'loser':state==='argue'?'arguing':'';
  const cCls = cWin?'winner':jWin?'loser':state==='argue'?'arguing':'';
  const jBubble = jWin ? 'I was right! ✓' : cWin ? 'Nice one, Clara.' : q.jSays;
  const cBubble = cWin ? 'I was right! ✓' : jWin ? 'Fair enough, Jason.' : q.cSays;
  return `
    <div class="hosts-row">
      <div class="host-panel jason-panel">
        <div class="bubble">${jBubble}</div>
        <div class="host-avatar ${jCls}">${jasonSVG(jExpr)}</div>
        <div class="host-name">Jason</div>
      </div>
      <div class="vs-center">
        <div class="vs-divider"></div>
        <div class="vs-text">vs</div>
        <div class="vs-divider"></div>
      </div>
      <div class="host-panel clara-panel">
        <div class="bubble">${cBubble}</div>
        <div class="host-avatar ${cCls}">${claraSVG(cExpr)}</div>
        <div class="host-name">Clara</div>
      </div>
    </div>`;
}

function render() {
  answered = false;
  const q = QS[cQ];
  document.getElementById('qVal').textContent = `${cQ+1} of 5`;
  document.getElementById('progFill').style.width = `${(cQ/5)*100}%`;

  document.getElementById('gameArea').innerHTML = `
    <div class="timer-row">
      <div class="q-label-pill">Question ${cQ+1}</div>
      <div class="timer-ring-wrap">
        <svg class="timer-svg" viewBox="0 0 54 54">
          <circle class="t-bg" cx="27" cy="27" r="24"/>
          <circle class="t-arc" id="tArc" cx="27" cy="27" r="24"/>
        </svg>
        <div class="timer-inner" id="tNum">10</div>
      </div>
    </div>

    <div class="sentence-wrap">
      <div class="sentence-micro">Fill in the blank</div>
      <div class="sentence-text">"${q.sentence.replace('_____','<span class="blank">_____</span>')}"</div>
    </div>

    ${hostsHTML('argue')}

    <div class="choices" id="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice-btn" id="cb${i}" onclick="choose(${i})">
          <div class="choice-key">${['A','B'][i]}</div>
          <div class="choice-word">${c}</div>
        </button>`).join('')}
    </div>

    <div class="result-panel" id="resultPanel">
      <div class="result-verdict" id="resultVerdict"></div>
      <div class="result-defs" id="resultDefs"></div>
    </div>
    <div class="cta-bar" id="ctaBar">💬 <span>Which one did you pick?</span> — Tell us in the comments.</div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">${cQ<4?'Continue →':'See Results'}</button>
  `;
  startTimer();
}

function choose(idx) {
  if (answered) return;
  answered = true;
  stopTimer();
  const q = QS[cQ];
  const ok = idx === q.answer;

  for (let i=0;i<2;i++) {
    const b = document.getElementById(`cb${i}`);
    b.disabled = true;
    if (i===q.answer) b.classList.add('correct');
    else if (i===idx && !ok) b.classList.add('wrong');
    else b.classList.add('dim');
  }

  if (ok) { score += 100 + Math.ceil(tLeft*10); streak++; }
  else streak = 0;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('streakVal').textContent = streak;

  // Update hosts
  const hr = document.querySelector('.hosts-row');
  if (hr) hr.outerHTML = hostsHTML(q.jPicks===q.answer ? 'j-win' : 'c-win');

  showResult(ok, q);
  if (ok) spawnConfetti();

  setTimeout(()=>{
    document.getElementById('nextBtn')?.classList.add('show');
    document.getElementById('ctaBar')?.classList.add('show');
  }, 450);
}

function timeUp() {
  if (answered) return;
  answered = true; streak = 0;
  document.getElementById('streakVal').textContent = 0;
  const q = QS[cQ];
  for (let i=0;i<2;i++) {
    const b = document.getElementById(`cb${i}`);
    b.disabled = true;
    if (i===q.answer) b.classList.add('correct'); else b.classList.add('dim');
  }
  showResult(false, q, true);
  setTimeout(()=>{
    document.getElementById('nextBtn')?.classList.add('show');
    document.getElementById('ctaBar')?.classList.add('show');
  }, 450);
}

function showResult(ok, q, timeout=false) {
  const p = document.getElementById('resultPanel');
  const v = document.getElementById('resultVerdict');
  const d = document.getElementById('resultDefs');
  if (!p) return;
  p.classList.add('show');

  if (timeout) {
    v.className='result-verdict timeout';
    v.innerHTML = `⏱ Time's Up &nbsp;—&nbsp; The answer was <strong>${q.choices[q.answer]}</strong>`;
  } else if (ok) {
    v.className='result-verdict correct';
    v.innerHTML = `✓ &nbsp;Correct &nbsp;+${100+Math.ceil(tLeft*10)} pts`;
  } else {
    v.className='result-verdict wrong';
    v.innerHTML = `✗ &nbsp;Incorrect &nbsp;—&nbsp; The answer is <strong>${q.choices[q.answer]}</strong>`;
  }

  d.innerHTML = q.defs.map(df=>`
    <div class="def-row">
      <div class="def-marker ${df.correct?'c':'o'}"></div>
      <div>
        <span class="def-kw ${df.correct?'':'other'}">${df.word}</span>
        <span class="def-meaning">— ${df.meaning}</span>
      </div>
    </div>`).join('');
}

function nextQ() {
  cQ++;
  if (cQ>=5) endGame(); else render();
}

function endGame() {
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('gameArea').innerHTML = '';
  const es = document.getElementById('endScreen');
  es.classList.add('show');
  document.getElementById('endScoreNum').textContent = score;
  const pct = score / (5*200);
  let h, m;
  if (pct>=0.85)      { h='Exceptional.';   m='You have the instincts of a native speaker.' }
  else if (pct>=0.65) { h='Well Played.';    m='Solid vocabulary. Keep pushing.' }
  else if (pct>=0.4)  { h='Good Effort.';    m='You\'re getting there. Try again!' }
  else                { h='Keep Studying.';  m='Every attempt brings you closer.' }
  document.getElementById('endHeading').textContent = h;
  document.getElementById('endMsg').textContent = m;
  spawnConfetti(50);
}

function startGame() {
  cQ=0; score=0; streak=0;
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('streakVal').textContent=0;
  document.getElementById('endScreen').classList.remove('show');
  render();
}

function startTimer() {
  clearInterval(tInt); tLeft=10; updateTimer();
  tInt = setInterval(()=>{ tLeft--; updateTimer(); if(tLeft<=0){clearInterval(tInt);timeUp();} }, 1000);
}
function stopTimer() { clearInterval(tInt); }
function updateTimer() {
  const num = document.getElementById('tNum');
  const arc = document.getElementById('tArc');
  if (!num||!arc) return;
  num.textContent = tLeft;
  arc.style.strokeDashoffset = CIRC*(1-tLeft/10);
  const urgent = tLeft<=3;
  arc.style.stroke = urgent ? '#ef4444' : '#e8b84b';
  num.style.color  = urgent ? '#ef4444' : '#e8b84b';
}

function spawnConfetti(n=28) {
  const w = document.getElementById('confetti');
  w.innerHTML='';
  const cols=['#e8b84b','#4f8ef7','#e05c5c','#22c55e','#f97316','#a78bfa'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='cp';
    const sz=6+Math.random()*8;
    c.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};--dur:${1.4+Math.random()*1.8}s;--del:${Math.random()*0.5}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    w.appendChild(c);
  }
  setTimeout(()=>w.innerHTML='',4000);
}

startGame();
</script>
</body>
</html>
